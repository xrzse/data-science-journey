<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAS → R Translator</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #13161d;
      --surface2:  #1a1e28;
      --border:    #252a38;
      --border2:   #2f3547;
      --accent:    #4ade80;
      --accent2:   #22d3ee;
      --accent3:   #f59e0b;
      --muted:     #4b5568;
      --text:      #e2e8f0;
      --text2:     #94a3b8;
      --text3:     #64748b;
      --error:     #f87171;
      --glow:      rgba(74, 222, 128, 0.15);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,15,20,0.9);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 700;
      color: #0d0f14;
    }

    .logo-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    .logo-text span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .api-input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 6px 12px;
      transition: border-color 0.2s;
    }

    .api-input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--glow);
    }

    .api-input-wrap label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .api-input-wrap input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      width: 220px;
    }

    .api-input-wrap input::placeholder { color: var(--muted); }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .status-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .toolbar-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-right: 4px;
    }

    .chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .chip:hover { border-color: var(--accent2); color: var(--accent2); }
    .chip:active { transform: scale(0.96); }

    .spacer { flex: 1; }

    .btn-translate {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      padding: 8px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .btn-translate:hover { background: #6ee7a0; transform: translateY(-1px); box-shadow: 0 4px 16px var(--glow); }
    .btn-translate:active { transform: translateY(0); }
    .btn-translate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-translate .spinner {
      width: 12px; height: 12px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #0d0f14;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .btn-translate.loading .spinner { display: block; }
    .btn-translate.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MAIN PANELS ── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    .panel:last-child { border-right: none; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .panel-title .lang-badge {
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 10px;
    }

    .badge-sas {
      background: rgba(245, 158, 11, 0.15);
      color: var(--accent3);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .badge-r {
      background: rgba(74, 222, 128, 0.12);
      color: var(--accent);
      border: 1px solid rgba(74, 222, 128, 0.25);
    }

    .panel-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--text3);
      cursor: pointer;
      padding: 4px 8px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      transition: all 0.15s;
    }

    .icon-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    textarea, .output-box {
      flex: 1;
      background: var(--surface);
      color: var(--text);
      border: none;
      outline: none;
      resize: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      padding: 20px;
      tab-size: 2;
      overflow-y: auto;
    }

    textarea::placeholder { color: var(--text3); }

    textarea:focus { background: var(--surface2); }

    .output-box {
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── BOTTOM: EXPLANATION ── */
    .explanation-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--border);
      height: 180px;
      flex-shrink: 0;
    }

    .explanation-pane {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .explanation-pane:last-child { border-right: none; }

    .explanation-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .explanation-header span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text3);
    }

    .explanation-body {
      padding: 12px 16px;
      font-size: 12.5px;
      color: var(--text2);
      line-height: 1.65;
      overflow-y: auto;
      flex: 1;
    }

    .explanation-body.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }

    /* syntax highlighting */
    .kw  { color: #c084fc; }   /* purple: keywords */
    .fn  { color: var(--accent2); }  /* cyan: functions */
    .st  { color: var(--accent3); }  /* amber: strings */
    .cm  { color: var(--muted); font-style: italic; }  /* comments */
    .nm  { color: #fb7185; }   /* pink: numbers */
    .op  { color: var(--text2); } /* operators */

    /* error state */
    .error-msg {
      color: var(--error);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 12px 16px;
      background: rgba(248, 113, 113, 0.07);
      border: 1px solid rgba(248, 113, 113, 0.2);
      border-radius: 6px;
      margin: 16px;
    }

    /* line numbers area */
    .editor-wrap {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .line-nums {
      padding: 20px 10px 20px 14px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text3);
      text-align: right;
      user-select: none;
      min-width: 44px;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* streaming cursor */
    .cursor-blink {
      display: inline-block;
      width: 2px; height: 14px;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* copy toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: #0d0f14;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 6px;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">S→R</div>
      <div class="logo-text">SAS<span>→</span>R &nbsp;<span style="color:var(--text3);font-weight:300">translator</span></div>
    </div>
    <div class="header-right">
      <div class="api-input-wrap">
        <label>API KEY</label>
        <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off"/>
        <div class="status-dot" id="statusDot"></div>
      </div>
    </div>
  </header>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <span class="toolbar-label">Examples</span>
    <button class="chip" onclick="window.loadExample('proc_means')">PROC MEANS</button>
    <button class="chip" onclick="window.loadExample('proc_sort')">PROC SORT</button>
    <button class="chip" onclick="window.loadExample('data_step')">DATA STEP</button>
    <button class="chip" onclick="window.loadExample('proc_reg')">PROC REG</button>
    <button class="chip" onclick="window.loadExample('macro')">MACRO</button>
    <div class="spacer"></div>
    <button class="btn-translate" id="translateBtn" onclick="window.translate()">
      <div class="spinner"></div>
      <span class="btn-label">▶ &nbsp;Translate</span>
    </button>
  </div>

  <!-- PANELS -->
  <div class="panels">
    <!-- INPUT -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <span class="lang-badge badge-sas">SAS</span>
          Input
        </div>
        <div class="panel-actions">
          <button class="icon-btn" onclick="window.clearInput()">clear</button>
        </div>
      </div>
      <div class="editor-wrap">
        <div class="line-nums" id="lineNums">1</div>
        <textarea id="sasInput" spellcheck="false"
          placeholder="/* Paste your SAS code here... */&#10;&#10;PROC MEANS DATA=mydata;&#10;  VAR income age;&#10;RUN;"
          oninput="updateLineNums()"></textarea>
      </div>
    </div>

    <!-- OUTPUT -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <span class="lang-badge badge-r">R</span>
          Output
        </div>
        <div class="panel-actions">
          <button class="icon-btn" onclick="window.copyOutput()">copy</button>
        </div>
      </div>
      <div class="editor-wrap">
        <div class="output-box" id="rOutput"><span style="color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px"># Translated R code will appear here...</span></div>
      </div>
    </div>
  </div>

  <!-- EXPLANATION ROW -->
  <div class="explanation-row">
    <div class="explanation-pane">
      <div class="explanation-header">
        <span>⬡ What this SAS code does</span>
      </div>
      <div class="explanation-body empty" id="sasExplain">awaiting translation...</div>
    </div>
    <div class="explanation-pane">
      <div class="explanation-header">
        <span>⬡ Translation notes</span>
      </div>
      <div class="explanation-body empty" id="rNotes">awaiting translation...</div>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast">Copied to clipboard!</div>

<script>
  // ── LINE NUMBERS ──
  function updateLineNums() {
    const ta = document.getElementById('sasInput');
    const lines = ta.value.split('\n').length;
    document.getElementById('lineNums').textContent =
      Array.from({length: lines}, (_, i) => i + 1).join('\n');
  }

  // sync scroll
  document.getElementById('sasInput').addEventListener('scroll', function() {
    document.getElementById('lineNums').scrollTop = this.scrollTop;
  });

  updateLineNums();

  // ── API KEY STATUS ──
  document.getElementById('apiKey').addEventListener('input', function() {
    const dot = document.getElementById('statusDot');
    dot.classList.toggle('active', this.value.length > 20);
  });

  // ── EXAMPLES ──
  const examples = {
    proc_means: `/* Summarize numeric variables in a dataset */
PROC MEANS DATA=housing_survey N MEAN STD MIN MAX;
  VAR monthly_rent household_income bedrooms;
  CLASS province;
RUN;`,
    proc_sort: `/* Sort dataset by province and income */
PROC SORT DATA=housing_survey OUT=housing_sorted;
  BY province DESCENDING household_income;
RUN;`,
    data_step: `/* Create new variables and filter rows */
DATA affordable_housing;
  SET housing_survey;
  rent_to_income = monthly_rent / (household_income / 12);
  housing_stress = (rent_to_income > 0.30);
  IF province IN ('ON', 'BC', 'QC');
RUN;`,
    proc_reg: `/* Run a linear regression */
PROC REG DATA=housing_survey;
  MODEL monthly_rent = household_income bedrooms bathrooms;
  OUTPUT OUT=reg_out PREDICTED=predicted_rent RESIDUAL=residual;
RUN;
QUIT;`,
    macro: `/* Macro to compute summary stats for any variable */
%MACRO summarize(data=, var=);
  PROC MEANS DATA=&data N MEAN STD;
    VAR &var;
  RUN;
%MEND summarize;

%summarize(data=housing_survey, var=monthly_rent);
%summarize(data=housing_survey, var=household_income);`
  };

  window.loadExample = function(key) {
    document.getElementById('sasInput').value = examples[key];
    updateLineNums();
  }

  window.clearInput = function() {
    document.getElementById('sasInput').value = '';
    updateLineNums();
    document.getElementById('rOutput').innerHTML = '<span style="color:var(--text3);font-family:\'JetBrains Mono\',monospace;font-size:11px"># Translated R code will appear here...</span>';
    document.getElementById('sasExplain').textContent = 'awaiting translation...';
    document.getElementById('sasExplain').classList.add('empty');
    document.getElementById('rNotes').textContent = 'awaiting translation...';
    document.getElementById('rNotes').classList.add('empty');
  }

  // ── COPY ──
  window.copyOutput = function() {
    const text = document.getElementById('rOutput').innerText;
    navigator.clipboard.writeText(text).then(() => {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    });
  }

  // ── SYNTAX HIGHLIGHT (simple R) ──
  function highlightR(code) {
    const escaped = code
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    return escaped
      // comments
      .replace(/(#[^\n]*)/g, '<span class="cm">$1</span>')
      // strings
      .replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="st">$1</span>')
      // keywords
      .replace(/\b(if|else|for|while|function|return|TRUE|FALSE|NULL|NA|library|require|install\.packages|source)\b/g, '<span class="kw">$1</span>')
      // numbers
      .replace(/\b(\d+\.?\d*)\b/g, '<span class="nm">$1</span>')
      // pipe operators
      .replace(/(%>%|&lt;-|->|==|!=|&lt;=|&gt;=)/g, '<span class="op">$1</span>')
      // common tidyverse/base fns
      .replace(/\b(ggplot|aes|geom_\w+|mutate|filter|select|arrange|group_by|summarize|summarise|left_join|inner_join|read_csv|write_csv|lm|glm|data\.frame|tibble|c|list|mean|sd|sum|min|max|nrow|ncol|head|tail|str|summary|print|paste|paste0|sprintf|which|is\.na|na\.omit|as\.\w+|factor|levels|table|prop\.table)\b/g, '<span class="fn">$1</span>');
  }

  // ── MAIN TRANSLATE ──
  async function translate() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const sasCode = document.getElementById('sasInput').value.trim();
    const btn = document.getElementById('translateBtn');
    const rOut = document.getElementById('rOutput');
    const sasExplain = document.getElementById('sasExplain');
    const rNotes = document.getElementById('rNotes');

    if (!apiKey) {
      rOut.innerHTML = '<div class="error-msg">⚠ Please enter your Anthropic API key above.</div>';
      return;
    }
    if (!sasCode) {
      rOut.innerHTML = '<div class="error-msg">⚠ Please enter some SAS code to translate.</div>';
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;
    rOut.innerHTML = '<span style="color:var(--text3);font-family:\'JetBrains Mono\',monospace;font-size:12px">translating<span class="cursor-blink"></span></span>';
    sasExplain.textContent = '';
    sasExplain.classList.remove('empty');
    rNotes.textContent = '';
    rNotes.classList.remove('empty');

    const prompt = `You are an expert in both SAS and R, specializing in translating legacy SAS code to modern, idiomatic R (preferring tidyverse when appropriate).

Given the following SAS code, respond ONLY with a JSON object in this exact format:
{
  "r_code": "the complete translated R code as a string",
  "sas_explanation": "2-3 sentences explaining what the SAS code does in plain English",
  "translation_notes": "2-3 sentences explaining key translation decisions, any gotchas, and recommended R packages used"
}

Do not include any text outside the JSON. Do not wrap in markdown code fences.

SAS code to translate:
\`\`\`sas
${sasCode}
\`\`\``;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || `API error ${response.status}`);
      }

      const data = await response.json();
      const raw = data.content[0].text.trim();

      let parsed;
      try {
        parsed = JSON.parse(raw);
      } catch {
        // fallback: try to extract JSON
        const match = raw.match(/\{[\s\S]*\}/);
        if (match) parsed = JSON.parse(match[0]);
        else throw new Error('Could not parse response. Try again.');
      }

      // render R code with syntax highlighting
      rOut.innerHTML = highlightR(parsed.r_code || '# No R code returned');

      sasExplain.textContent = parsed.sas_explanation || '—';
      rNotes.textContent = parsed.translation_notes || '—';

    } catch (err) {
      rOut.innerHTML = `<div class="error-msg">⚠ ${err.message}</div>`;
      sasExplain.classList.add('empty');
      sasExplain.textContent = 'awaiting translation...';
      rNotes.classList.add('empty');
      rNotes.textContent = 'awaiting translation...';
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  // keyboard shortcut: Ctrl/Cmd + Enter
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') translate();
  });
</script>
</body>
</html>
